name: Validate Symbol Fields

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-symbol-fields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate all symbol libraries
        shell: bash
        run: make validate

      - name: Check LIBRARIES.md is up to date
        shell: bash
        run: |
          python3 scripts/generate-libraries-md.py
          git diff --exit-code LIBRARIES.md
