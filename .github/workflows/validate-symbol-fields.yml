name: Validate Symbol Fields

on:
  pull_request:
  push:

jobs:
  validate-symbol-fields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate all symbol libraries
        shell: bash
        run: python3 scripts/check-symbol-fields.py
